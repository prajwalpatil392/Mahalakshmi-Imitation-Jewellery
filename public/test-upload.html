<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload Test - Mahalakshmi Jewellery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        .preview-area {
            margin-top: 20px;
            display: none;
        }

        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .file-info {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }

        .file-info strong {
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-upload:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f44336;
            color: white;
        }

        .btn-clear:hover {
            background: #d32f2f;
        }

        .result-area {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .result-success {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }

        .result-error {
            background: #ffebee;
            border: 2px solid #f44336;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .result-success .result-title {
            color: #2e7d32;
        }

        .result-error .result-title {
            color: #c62828;
        }

        .result-content {
            font-size: 14px;
            color: #666;
            word-break: break-all;
        }

        .result-image {
            margin-top: 15px;
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .config-info {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .config-info strong {
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Upload Test</h1>
        <p class="subtitle">Test Cloudinary image upload functionality</p>

        <div class="config-info">
            <strong>📋 Configuration:</strong><br>
            Cloud: dcgfc7bse<br>
            Endpoint: /api/upload/product<br>
            Max Size: 5MB<br>
            Formats: JPEG, PNG, WebP, GIF
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Click to upload or drag & drop</div>
            <div class="upload-hint">JPEG, PNG, WebP, GIF (Max 5MB)</div>
            <input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png,image/webp,image/gif">
        </div>

        <div class="preview-area" id="previewArea">
            <img id="previewImage" class="preview-image" alt="Preview">
            <div class="file-info" id="fileInfo"></div>
            <button class="btn btn-upload" id="uploadBtn">
                🚀 Upload to Cloudinary
            </button>
            <button class="btn btn-clear" id="clearBtn">
                🗑️ Clear Selection
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Uploading to Cloudinary...</div>
        </div>

        <div class="result-area" id="resultArea"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const previewImage = document.getElementById('previewImage');
        const fileInfo = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');

        let selectedFile = null;

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Handle file selection
        function handleFile(file) {
            // Validate file type
            const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showResult(false, 'Invalid file type. Please select JPEG, PNG, WebP, or GIF.');
                return;
            }

            // Validate file size (5MB)
            if (file.size > 5 * 1024 * 1024) {
                showResult(false, 'File too large. Maximum size is 5MB.');
                return;
            }

            selectedFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewArea.style.display = 'block';
                resultArea.style.display = 'none';
                
                // Show file info
                fileInfo.innerHTML = `
                    <strong>File:</strong> ${file.name}<br>
                    <strong>Size:</strong> ${(file.size / 1024).toFixed(2)} KB<br>
                    <strong>Type:</strong> ${file.type}
                `;
            };
            reader.readAsDataURL(file);
        }

        // Upload button
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            loading.classList.add('active');
            resultArea.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('image', selectedFile);
                formData.append('productId', Date.now());

                const response = await fetch('/api/upload/product', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResult(true, 'Image uploaded successfully!', data);
                } else {
                    const errorMsg = data?.error?.message || data?.error || 'Upload failed';
                    showResult(false, errorMsg);
                }
            } catch (error) {
                showResult(false, `Upload error: ${error.message}`);
            } finally {
                uploadBtn.disabled = false;
                loading.classList.remove('active');
            }
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            previewArea.style.display = 'none';
            resultArea.style.display = 'none';
        });

        // Show result
        function showResult(success, message, data = null) {
            resultArea.className = 'result-area ' + (success ? 'result-success' : 'result-error');
            
            let content = `
                <div class="result-title">${success ? '✅ Success' : '❌ Error'}</div>
                <div class="result-content">${message}</div>
            `;

            if (success && data) {
                content += `
                    <div class="result-content" style="margin-top: 15px;">
                        <strong>Image URL:</strong><br>
                        <a href="${data.imageUrl}" target="_blank" style="color: #667eea; word-break: break-all;">
                            ${data.imageUrl}
                        </a><br><br>
                        <strong>Public ID:</strong> ${data.publicId || data.filename}
                    </div>
                    <img src="${data.imageUrl}" class="result-image" alt="Uploaded">
                `;
            }

            resultArea.innerHTML = content;
            resultArea.style.display = 'block';
        }
    </script>
</body>
</html>
