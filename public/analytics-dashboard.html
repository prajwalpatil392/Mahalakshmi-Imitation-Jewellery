<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Mahalakshmi</title>
    <link rel="stylesheet" href="css/analytics-dashboard.css"/>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Analytics Dashboard</h1>
            <p>Real-time performance and user behavior monitoring</p>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-value" id="pageViews">-</div>
                <div class="metric-label">
                    <span class="status-indicator status-good"></span>
                    Page Views Today
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="avgLoadTime">-</div>
                <div class="metric-label">
                    <span class="status-indicator" id="loadTimeStatus"></span>
                    Avg Load Time (ms)
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="cartAdditions">-</div>
                <div class="metric-label">
                    <span class="status-indicator status-good"></span>
                    Cart Additions
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="orders">-</div>
                <div class="metric-label">
                    <span class="status-indicator status-good"></span>
                    Orders Today
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="refreshMetrics()">🔄 Refresh</button>
            <button onclick="clearLogs()">🗑️ Clear Logs</button>
            <button onclick="exportData()">📥 Export Data</button>
            <span style="margin-left: 20px; color: #666;">
                Last updated: <span id="lastUpdate">-</span>
            </span>
        </div>

        <div class="log-container">
            <h3>Recent Analytics Events</h3>
            <div id="analyticsLog">
                <div class="log-entry">
                    <span class="log-timestamp">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/analytics-dashboard.js"></script>
</body>
</html>
